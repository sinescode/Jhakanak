name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux AMD64 - Native
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: btc-scanner
            asset_name: btc-scanner-linux-amd64
            cross: false
          
          # Linux ARM64 - Cross compile
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: btc-scanner
            asset_name: btc-scanner-linux-arm64
            cross: false
          
          # Windows AMD64 - Cross compile
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            binary_name: btc-scanner.exe
            asset_name: btc-scanner-windows-amd64.exe
            cross: false
          
          # Android ARM64 - Cross compile
          - target: aarch64-linux-android
            os: ubuntu-latest
            binary_name: btc-scanner
            asset_name: btc-scanner-android-arm64
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install ALL cross-compilation tools at once
      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            mingw-w64 \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            binutils-aarch64-linux-gnu

      # Install Android NDK
      - name: Install Android NDK
        if: matrix.target == 'aarch64-linux-android'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q android-ndk-r26b-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26b" >> $GITHUB_ENV

      # Build with VENDORED OpenSSL (compiles OpenSSL from source)
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          # Force vendored OpenSSL compilation
          OPENSSL_VENDORED: 1
          OPENSSL_STATIC: 1
          
          # Windows cross-compile settings
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
          AR_x86_64_pc_windows_gnu: x86_64-w64-mingw32-ar
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          
          # Linux ARM64 cross-compile settings
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          
          # Android cross-compile settings
          CC_aarch64_linux_android: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang
          AR_aarch64_linux_android: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang

      # Package binaries
      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.asset_name }}
          cd dist
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            zip ${{ matrix.asset_name }}.zip ${{ matrix.asset_name }}
            echo "ASSET=${{ matrix.asset_name }}.zip" >> $GITHUB_ENV
          else
            tar -czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }}
            echo "ASSET=${{ matrix.asset_name }}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ env.ASSET }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
